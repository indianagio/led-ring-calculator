<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED Ring Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 28px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b8ba7;
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }
    input[type=number] {
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      color: #e0e0f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border 0.2s;
    }
    input[type=number]:focus { border-color: #7c3aed; }
    .unit {
      font-size: 0.85rem;
      color: #6b7280;
      white-space: nowrap;
    }
    .slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .slider-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: #a78bfa;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 4px;
      background: #2d2d4e;
      outline: none;
      margin-bottom: 4px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #7c3aed;
      cursor: pointer;
      box-shadow: 0 0 8px #7c3aed88;
    }
    .range-hints {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #4b4b6b;
      margin-bottom: 20px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
    }
    .result-box {
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .result-box .val {
      font-size: 1.5rem;
      font-weight: 800;
      color: #34d399;
    }
    .result-box.highlight .val {
      color: #f59e0b;
    }
    .result-box .lbl {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6b7280;
      margin-top: 4px;
    }
    .note {
      font-size: 0.78rem;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }
    /* Canvas */
    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      border-radius: 50%;
      display: block;
    }
    .perfect-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge-perfect { background: #064e3b; color: #34d399; }
    .badge-close   { background: #422006; color: #f59e0b; }
    .badge-off     { background: #450a0a; color: #f87171; }
    .badge-wrap    { text-align: center; }
  </style>
</head>
<body>

<h1>💡 LED Ring Calculator</h1>
<p class="subtitle">Calcola il diametro ideale per avvolgere una striscia LED WS2812</p>

<div class="card">
  <label>LED per metro</label>
  <div class="input-row">
    <input type="number" id="ledsPerMeter" value="60" min="1" max="600" step="1" />
    <span class="unit">LED/m</span>
  </div>

  <div class="slider-label-row">
    <label style="margin-bottom:0">Diametro del cerchio</label>
    <span class="slider-val"><span id="diamVal">150</span> mm</span>
  </div>
  <input type="range" id="diamSlider" min="10" max="1000" step="1" value="150" />
  <div class="range-hints"><span>10 mm</span><span>1000 mm</span></div>

  <div class="results-grid">
    <div class="result-box">
      <div class="val" id="resCirc">—</div>
      <div class="lbl">Circonferenza (mm)</div>
    </div>
    <div class="result-box">
      <div class="val" id="resLedExact">—</div>
      <div class="lbl">LED esatti (float)</div>
    </div>
    <div class="result-box highlight">
      <div class="val" id="resLedRound">—</div>
      <div class="lbl">LED interi sul cerchio</div>
    </div>
    <div class="result-box">
      <div class="val" id="resSpacing">—</div>
      <div class="lbl">Interasse effettivo (mm)</div>
    </div>
  </div>
  <div class="note" id="noteText"></div>
</div>

<div class="card">
  <div class="canvas-wrap">
    <canvas id="ringCanvas" width="400" height="400"></canvas>
  </div>
  <div class="badge-wrap">
    <span class="perfect-badge" id="qualityBadge">—</span>
  </div>
</div>

<script>
  const ledsInput   = document.getElementById('ledsPerMeter');
  const diamSlider  = document.getElementById('diamSlider');
  const diamVal     = document.getElementById('diamVal');
  const resCirc     = document.getElementById('resCirc');
  const resLedExact = document.getElementById('resLedExact');
  const resLedRound = document.getElementById('resLedRound');
  const resSpacing  = document.getElementById('resSpacing');
  const noteText    = document.getElementById('noteText');
  const canvas      = document.getElementById('ringCanvas');
  const ctx         = canvas.getContext('2d');
  const badge       = document.getElementById('qualityBadge');

  function calculate() {
    const ledsPerMeter = parseFloat(ledsInput.value) || 60;
    const diamMm       = parseFloat(diamSlider.value);
    diamVal.textContent = diamMm;

    const pitchMm   = 1000 / ledsPerMeter;          // interasse nominale mm
    const circMm    = Math.PI * diamMm;              // circonferenza
    const ledExact  = circMm / pitchMm;              // LED ideali (float)
    const ledRound  = Math.round(ledExact);          // LED interi
    const spacingEff = circMm / ledRound;            // interasse effettivo

    const error = Math.abs(ledExact - ledRound) / ledExact * 100; // % errore

    resCirc.textContent     = circMm.toFixed(1);
    resLedExact.textContent = ledExact.toFixed(2);
    resLedRound.textContent = ledRound;
    resSpacing.textContent  = spacingEff.toFixed(2);

    noteText.textContent = `Interasse nominale: ${pitchMm.toFixed(2)} mm  |  Errore distribuzione: ${error.toFixed(2)}%`;

    // Badge qualità
    if (error < 1) {
      badge.textContent = '✅ Distribuzione perfetta';
      badge.className   = 'perfect-badge badge-perfect';
    } else if (error < 3) {
      badge.textContent = '⚠️ Distribuzione accettabile';
      badge.className   = 'perfect-badge badge-close';
    } else {
      badge.textContent = '❌ Distribuzione irregolare';
      badge.className   = 'perfect-badge badge-off';
    }

    drawRing(ledRound, error);
  }

  function drawRing(ledCount, errorPct) {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2;
    const R  = W * 0.38;
    const rInner = R * 0.72;

    // Background glow
    const grd = ctx.createRadialGradient(cx, cy, rInner * 0.5, cx, cy, R * 1.1);
    grd.addColorStop(0, '#1a1a2e');
    grd.addColorStop(1, '#0f0f1a');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Ring track
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = '#2d2d4e';
    ctx.lineWidth   = R - rInner;
    ctx.stroke();

    // LED dots
    const ledColor = errorPct < 1 ? '#34d399' : errorPct < 3 ? '#f59e0b' : '#f87171';
    const glowColor = errorPct < 1 ? '#34d39944' : errorPct < 3 ? '#f59e0b44' : '#f8717144';
    const rMid = (R + rInner) / 2;
    const ledRadius = Math.max(2, Math.min(7, rMid * Math.PI / ledCount * 0.38));

    for (let i = 0; i < ledCount; i++) {
      const angle = (i / ledCount) * Math.PI * 2 - Math.PI / 2;
      const x = cx + rMid * Math.cos(angle);
      const y = cy + rMid * Math.sin(angle);

      // Glow
      const g = ctx.createRadialGradient(x, y, 0, x, y, ledRadius * 2.5);
      g.addColorStop(0, glowColor);
      g.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(x, y, ledRadius * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(x, y, ledRadius, 0, Math.PI * 2);
      ctx.fillStyle = ledColor;
      ctx.fill();
    }

    // Center label
    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 22px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ledCount + ' LED', cx, cy - 10);
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#6b7280';
    ctx.fillText('Ø ' + diamSlider.value + ' mm', cx, cy + 14);
  }

  ledsInput.addEventListener('input', calculate);
  diamSlider.addEventListener('input', calculate);
  calculate();
</script>

</body>
</html>
